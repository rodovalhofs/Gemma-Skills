<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #00A3FF;
      --bg: #121212;
      --card-bg: #1E1E1E;
      --text: #FFF;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      padding: 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
    }

    .subject-title {
      font-size: 1.1rem;
      color: var(--primary);
      margin: 0;
    }

    .progress {
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: 4px;
    }

    .card-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1000px;
      padding: 20px;
    }

    .card {
      width: 100%;
      height: 100%;
      max-width: 320px;
      max-height: 480px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      box-sizing: border-box;
      border-radius: 20px;
      background: var(--card-bg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }

    .face.back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #1E1E1E 0%, #121212 100%);
    }

    .content {
      font-size: 1.25rem;
      line-height: 1.5;
    }

    .label {
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 2px;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .controls {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 24px;
      background: rgba(255, 255, 255, 0.03);
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="subject-title" id="subject-name">Subject</h1>
    <div class="progress" id="card-progress">1 de 0</div>
  </div>

  <div class="card-container">
    <div class="card" id="flashcard">
      <div class="face front">
        <div class="label">PERGUNTA</div>
        <div class="content" id="q-content">Carregando...</div>
      </div>
      <div class="face back">
        <div class="label">RESPOSTA</div>
        <div class="content" id="a-content">Carregando...</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prev-btn">◀ Anterior</button>
    <button class="btn" id="next-btn">Próximo ▶</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data');
    
    let state = {
      index: 0,
      cards: [],
      subject: ""
    };

    if (rawData) {
      try {
        const input = JSON.parse(decodeURIComponent(rawData));
        state.cards = input.cards || [];
        state.subject = input.subject || "Estudo";
        render();
      } catch (e) {
        document.body.innerHTML = "Erro ao carregar flashcards.";
      }
    }

    function render() {
      if (state.cards.length === 0) return;
      
      const current = state.cards[state.index];
      const card = document.getElementById('flashcard');
      
      // Reset flip before changing content
      card.classList.remove('flipped');
      setTimeout(() => {
        document.getElementById('subject-name').innerText = state.subject;
        document.getElementById('card-progress').innerText = `${state.index + 1} de ${state.cards.length}`;
        document.getElementById('q-content').innerText = current.front;
        document.getElementById('a-content').innerText = current.back;
      }, card.classList.contains('flipped') ? 300 : 0);

      document.getElementById('prev-btn').disabled = state.index === 0;
      document.getElementById('next-btn').disabled = state.index === state.cards.length - 1;
    }

    document.getElementById('flashcard').addEventListener('click', () => {
      document.getElementById('flashcard').classList.toggle('flipped');
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (state.index > 0) {
        state.index--;
        render();
      }
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      if (state.index < state.cards.length - 1) {
        state.index++;
        render();
      }
    });
  </script>
</body>
</html>
